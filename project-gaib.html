<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project — Sharvari Patil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --white: #F7F4EF; --black: #0E0E0E; --gray-100: #F0EDE6; --gray-200: #E2DDD5;
    --gray-400: #8C8880; --gray-600: #6B6760; --rule: rgba(14,14,14,0.10);
    --serif: 'Playfair Display', Georgia, serif; --sans: 'Inter', system-ui, sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--white); color: var(--black); font-family: var(--sans); font-size: 16px; line-height: 1.5; cursor: none; overflow-x: hidden; }
  .cursor { position: fixed; width: 10px; height: 10px; background: var(--black); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: width 0.25s ease, height 0.25s ease; mix-blend-mode: difference; }
  .cursor.big { width: 56px; height: 56px; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 500; display: flex; align-items: center; justify-content: space-between; padding: 22px 48px; background: var(--white); border-bottom: 1px solid var(--rule); transition: padding 0.3s ease; }
  nav.scrolled { padding: 14px 48px; }
  .nav-logo { font-family: var(--serif); font-size: 17px; font-weight: 400; text-decoration: none; color: var(--black); }
  .nav-back { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-decoration: none; color: var(--gray-600); text-transform: uppercase; transition: color 0.2s; }
  .nav-back:hover { color: var(--black); }
  .coming-soon {
    min-height: 80vh;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 160px 48px 80px;
    border-bottom: 1px solid var(--rule);
  }
  .eyebrow { font-size: 10px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--gray-400); font-weight: 500; margin-bottom: 24px; display: flex; align-items: center; gap: 16px; }
  .eyebrow::before { content: ''; display: block; width: 32px; height: 1px; background: var(--gray-400); }
  h1 { font-family: var(--serif); font-size: clamp(40px, 6vw, 72px); font-weight: 400; line-height: 1.0; letter-spacing: -0.02em; margin-bottom: 28px; }
  h1 em { font-style: italic; }
  .subtitle { font-size: 18px; font-weight: 300; color: var(--gray-600); line-height: 1.7; max-width: 560px; margin-bottom: 48px; }
  .back-btn { display: inline-flex; align-items: center; gap: 10px; font-size: 12px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--black); text-decoration: none; border: 1px solid var(--gray-200); padding: 14px 28px; border-radius: 40px; transition: background 0.2s, border-color 0.2s; }
  .back-btn:hover { background: var(--gray-100); border-color: var(--gray-400); }
  footer { padding: 48px; display: flex; justify-content: space-between; align-items: center; }
  .footer-copy { font-size: 11px; color: var(--gray-400); letter-spacing: 0.06em; }
  @media (max-width: 768px) { nav { padding: 18px 24px; } .coming-soon { padding: 120px 24px 60px; } footer { padding: 32px 24px; flex-direction: column; gap: 12px; align-items: flex-start; } }
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<nav id="nav">
  <a href="index.html" class="nav-logo">Sharvari Patil</a>
  <a href="index.html" class="nav-back">← Back to work</a>
</nav>
<div class="coming-soon">
  <div class="eyebrow">Consumer Insights</div>
  <h1>This case study is<br><em>coming soon.</em></h1>
  <p class="subtitle">More details about this project will be added here. In the meantime, feel free to reach out if you'd like to know more.</p>
  <a href="index.html" class="back-btn">← Back to all work</a>
</div>
<footer>
  <span class="footer-copy">© 2026 Sharvari Patil. Consumer Insights & Strategy.</span>
</footer>
<script>
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });
  document.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('big'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('big'));
  });
  window.addEventListener('scroll', () => { document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 60); });
</script>
</body>
</html>
